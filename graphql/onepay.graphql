type OnePayPayment {
    id: String!
    status: String
    currency: String
    amount: Float
    external_id: String
    title: String
    description: String
    document_link: String
    phone: String
    expiration_at: String
    created_at: String
    paid_at: String
    amount_label: String
    payment_link: String
    customer: OnePayCustomerInfo
}

type OnePayCustomerInfo {
    first_name: String
    last_name: String
    email: String
    phone: String
    user_type: String
}

type OnePayPaymentIntent {
    id: String!
    status: String
    currency: String
    amount: Float
    amount_label: String
    payment_method_type: String
    payment_method_id: String
    network_id: String
    transaction_id: String
    remarks: OnePayRemarks
    is_test: Boolean
    created_at: String
    paid_at: String
}

type OnePayRemarks {
    code: String
    message: String
}

type OnePayCustomer {
    id: String!
    first_name: String
    last_name: String
    email: String
    phone: String
    document_type: String
    document_number: String
    created_at: String
}

type OnePayPaymentResult {
    success: Boolean!
    message: String!
    payment: JSON
}

extend type Query @guard {
    "Obtener información de un cobro específico en OnePay"
    onePayPayment(payment_id: String!): OnePayPayment @field(resolver: "App\\GraphQL\\Queries\\OnePayQuery@getPayment")

    "Obtener el historial de intentos de pago de un cobro en OnePay"
    onePayPaymentIntents(payment_id: String!): [OnePayPaymentIntent!]! @field(resolver: "App\\GraphQL\\Queries\\OnePayQuery@getPaymentIntents")

    "Obtener un cliente en OnePay por su número de documento"
    onePayCustomerByDocument(document_number: String!): OnePayCustomer @field(resolver: "App\\GraphQL\\Queries\\OnePayQuery@getCustomerByDocument")
}

extend type Mutation @guard {
    "Crear un nuevo cobro en OnePay para una factura"
    createOnePayPayment(invoice_id: ID!): OnePayPaymentResult @field(resolver: "App\\GraphQL\\Mutations\\OnePayMutation@createPayment")

    "Reenviar un cobro existente en OnePay"
    resendOnePayPayment(invoice_id: ID!): OnePayPaymentResult @field(resolver: "App\\GraphQL\\Mutations\\OnePayMutation@resendPayment")
}
