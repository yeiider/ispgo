type Invoice {
    id: ID!
    increment_id: String
    customer_id: ID!
    customer_name: String
    service_id: ID
    total: Float!
    subtotal: Float
    tax: Float
    discount: Float
    amount: Float
    outstanding_balance: Float
    status: String!
    issue_date: Date
    due_date: Date
    payment_date: DateTime
    payment_registered_by: String
    payment_method: String
    router_id: Int
    notes: String
    additional_information: JSON
    created_at: DateTime!
    updated_at: DateTime!

    customer: Customer! @belongsTo
    service: Service @belongsTo
    items: [InvoiceItem!]! @hasMany
    adjustments: [InvoiceAdjustment!]! @hasMany
    creditNotes: [CreditNote!]! @hasMany
    paymentPromises: [PaymentPromise!]! @hasMany
    payments: [InvoicePayment!]! @hasMany
    router: Router @belongsTo

    totalPaid: Float! @method(name: "getTotalPaidAttribute")
    realOutstandingBalance: Float! @method(name: "getRealOutstandingBalanceAttribute")
    isFullyPaid: Boolean! @method(name: "isFullyPaid")
}

type InvoiceItem {
    id: ID!
    description: String
    quantity: Int
    unit_price: Float
    subtotal: Float
    created_at: DateTime!
    updated_at: DateTime!

    invoice: Invoice! @belongsTo
    service: Service @belongsTo
}

type InvoiceAdjustment {
    id: ID!
    kind: String!
    amount: Float!
    label: String
    created_at: DateTime!
    updated_at: DateTime!

    invoice: Invoice! @belongsTo
}

type CreditNote {
    id: ID!
    amount: Float!
    issue_date: Date
    reason: String
    created_at: DateTime!
    updated_at: DateTime!

    invoice: Invoice! @belongsTo
}

type PaymentPromise {
    id: ID!
    amount: Float!
    promise_date: Date
    notes: String
    status: String
    created_at: DateTime!
    updated_at: DateTime!

    invoice: Invoice! @belongsTo
    customer: Customer! @belongsTo
}

type GenerateInvoiceResult {
    success: Boolean!
    message: String
    invoice: Invoice
}

type PaymentPromiseResult {
    success: Boolean!
    message: String
    payment_promise: PaymentPromise
}

type CashierDailyReport {
    date_from: Date
    date_to: Date
    total_cash: Float!
    total_transfer: Float!
    total_collected: Float!
    total_invoices: Int!
}

extend type Query {
    myCollectedInvoices(
        date: Date
        date_from: Date
        date_to: Date
        payment_method: String
    ): [Invoice!]! @paginate(defaultCount: 10, builder: "App\\GraphQL\\Queries\\CashierInvoicesQuery@myInvoices")

    myDailyCollectionReport(
        date: Date
        date_from: Date
        date_to: Date
    ): CashierDailyReport! @field(resolver: "App\\GraphQL\\Queries\\CashierInvoicesQuery@dailyReport")
}
