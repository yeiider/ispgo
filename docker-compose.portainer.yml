version: '3.8'

services:
  # Servicio App: Se encarga de Nginx, PHP-FPM y del SETUP inicial
  app:
    build: .
    container_name: ispgo-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8191}:80"
    environment:
      - APP_KEY=${APP_KEY}
      - APP_ENV=production
      - RUN_SETUP=true # Este será el encargado de correr composer/npm/migrate
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - .:/var/www/html
    networks:
      - ispgo-network
    depends_on:
      - redis
      - mysql

  # Servicio Worker: Procesa colas
  worker:
    build: .
    container_name: ispgo-worker
    restart: unless-stopped
    environment:
      - APP_KEY=${APP_KEY}
      - RUN_SETUP=false
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - .:/var/www/html
    networks:
      - ispgo-network
    depends_on:
      - app
    command: ["/usr/local/bin/run-worker.sh"]

  # Servicio Cron: Tareas programadas
  cron:
    build: .
    container_name: ispgo-cron
    restart: unless-stopped
    environment:
      - APP_KEY=${APP_KEY}
      - RUN_SETUP=false
      - DB_HOST=${DB_HOST}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - .:/var/www/html
    networks:
      - ispgo-network
    depends_on:
      - app
    command: ["/usr/local/bin/run-cron.sh"]

  mysql:
    image: mysql:8.0
    container_name: ispgo-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ispgo-network

  redis:
    image: redis:alpine
    container_name: ispgo-redis
    networks:
      - ispgo-network

networks:
  ispgo-network:
    driver: bridge

volumes:
  mysql-data:
